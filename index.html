<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋学习游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 围棋学习游戏</h1>
        <p class="subtitle">9×9 棋盘 · 入门级</p>
        
        <div class="game-info">
            <span id="current-player">当前回合：⚫ 黑方</span>
            <span id="captured-stones">提子：黑 0 / 白 0</span>
        </div>
        
        <div class="game-controls">
            <button id="undo-btn" disabled>🔙 悔棋</button>
            <button id="reset-btn">🔄 重新开始</button>
            <button id="pass-btn">⏭️ 弃权</button>
            <button id="ai-btn">🤖 AI：关</button>
        </div>
        
        <div class="game-controls">
            <div id="difficulty-div" class="difficulty-select" style="display: none;">
                <label for="difficulty-select">难度：</label>
                <select id="difficulty-select">
                    <option value="easy">简单</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困难</option>
                </select>
            </div>
        </div>
        
        <div class="board-container">
            <canvas id="go-board"></canvas>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="legend">
            <span>⚫ 黑子</span>
            <span>⚪ 白子</span>
            <span class="hint-possible">○ 合法落子</span>
            <span class="last-move">● 最后一手</span>
        </div>
        
        <!-- 复盘功能区 -->
        <div class="review-section">
            <h3>📋 棋谱复盘</h3>
            <div class="game-controls">
                <button id="review-btn" disabled>📋 复盘</button>
                <button id="prev-btn" disabled>◀️ 上一步</button>
                <button id="next-btn" disabled>▶️ 下一步</button>
                <button id="auto-play-btn" style="display: none;">▶️ 播放</button>
                <select id="speed-select" style="display: none;">
                    <option value="2000">慢速</option>
                    <option value="1000" selected>中速</option>
                    <option value="500">快速</option>
                </select>
            </div>
            <div id="review-info" class="review-info"></div>
        </div>
    </div>
    
    <script src="js/rules.js"></script>
    <script src="js/board.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
